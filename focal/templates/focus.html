<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📌 Focus Tasks</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f4;
    color: #1c1917;
    min-height: 100vh;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e7e5e4;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 18px; font-weight: 600; flex: 1; }
  .meta { font-size: 12px; color: #78716c; }
  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background .15s;
  }
  .btn-primary   { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: #e7e5e4; color: #1c1917; }
  .btn-secondary:hover { background: #d6d3d1; }
  .btn:disabled  { opacity: .5; cursor: not-allowed; }

  main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

  .loading, .error-box {
    text-align: center;
    padding: 60px 20px;
    color: #78716c;
    font-size: 15px;
  }
  .error-box { color: #dc2626; }

  .bucket { margin-bottom: 28px; }
  .bucket-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .bucket-header h2 { font-size: 15px; font-weight: 600; }
  .count-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    background: #e7e5e4;
    color: #57534e;
  }
  .empty-msg { font-size: 14px; color: #78716c; padding: 12px 0; }

  .task-card {
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .task-card:hover { border-color: #a8a29e; }
  .priority-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .dot-urgent { background: #dc2626; }
  .dot-high   { background: #f97316; }
  .dot-normal { background: #3b82f6; }
  .dot-low    { background: #a8a29e; }

  .task-body { flex: 1; min-width: 0; }
  .task-name {
    font-size: 14px;
    font-weight: 500;
    color: #1c1917;
    text-decoration: none;
  }
  .task-name:hover { text-decoration: underline; }
  .task-meta {
    font-size: 12px;
    color: #78716c;
    margin-top: 3px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .task-notes {
    font-size: 12px;
    color: #57534e;
    margin-top: 5px;
    font-style: italic;
  }
  .tag { padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; background: #f5f5f4; color: #57534e; }
  .tag-urgent { background: #fee2e2; color: #dc2626; }
  .tag-high   { background: #ffedd5; color: #c2410c; }

  .summary-bar {
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    font-size: 13px;
    color: #57534e;
  }
  .summary-bar strong { color: #1c1917; }

  .all-clear { text-align: center; padding: 60px 20px; font-size: 28px; }
  .all-clear p { font-size: 15px; color: #78716c; margin-top: 8px; }

  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 2px solid #e7e5e4;
    padding-bottom: 0;
  }
  .tab-btn {
    padding: 8px 18px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #78716c;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    border-radius: 4px 4px 0 0;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: #1c1917; }
  .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }
  .tab-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: #e7e5e4;
    color: #57534e;
    margin-left: 6px;
  }
  .tab-btn.active .tab-badge { background: #dbeafe; color: #1d4ed8; }
  .tab-badge.has-items { background: #fee2e2; color: #dc2626; }
  .tab-btn.active .tab-badge.has-items { background: #fee2e2; color: #dc2626; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #e7e5e4;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .focus-task-radio {
    flex-shrink: 0;
    margin-top: 4px;
    accent-color: #2563eb;
    cursor: pointer;
    width: 16px;
    height: 16px;
  }

  #focus-action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 2px solid #2563eb;
    padding: 12px 24px;
    display: none;
    align-items: center;
    gap: 16px;
    z-index: 20;
    box-shadow: 0 -2px 8px rgba(0,0,0,.08);
  }
  #focus-selected-label {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: #1c1917;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  body.has-action-bar main { padding-bottom: 72px; }

  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #fecaca; }

  .task-name-row { display: flex; align-items: center; gap: 6px; }
  .edit-btn {
    opacity: 0;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 4px;
    color: #78716c;
    transition: opacity .15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .task-card:hover .edit-btn { opacity: 1; }
  .edit-form { display: flex; flex-direction: column; gap: 8px; }
  .edit-input {
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid #e7e5e4;
    border-radius: 6px;
    width: 100%;
    color: #1c1917;
    font-family: inherit;
  }
  .edit-input:focus { outline: none; border-color: #2563eb; }
  .edit-actions { display: flex; gap: 8px; }

  .all-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    font-size: 13px;
  }
  .all-controls select {
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid #e7e5e4;
    border-radius: 6px;
    color: #1c1917;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
  }
  .sort-toggle { display: flex; gap: 4px; }
  .sort-btn {
    padding: 5px 12px;
    border: 1px solid #e7e5e4;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: #57534e;
    transition: all .15s;
    font-family: inherit;
  }
  .sort-btn.active { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
  .sort-btn:hover:not(.active) { background: #f5f5f4; }
</style>
</head>
<body>

<header>
  <h1>📌 Focus Tasks</h1>
  <span class="meta" id="meta-line">—</span>
  <button class="btn btn-secondary" id="btn-rebuild" onclick="rebuildCache()"
          title="Re-query Notion and rebuild the local task cache">🔄 Rebuild cache</button>
  <button class="btn btn-primary"   id="btn-refresh" onclick="loadFocus()">Refresh</button>
  <a href="/" class="btn btn-secondary" style="text-decoration:none;">← Focal</a>
</header>

<div id="focus-action-bar">
  <span id="focus-selected-label"></span>
  <button class="btn btn-danger" onclick="deleteSelectedTask()">🗑 Delete</button>
  <button class="btn btn-primary" onclick="loadTaskIntoWS()">⚡ Add to Work Session</button>
</div>

<main id="main-content">
  <div class="loading"><span class="spinner"></span> Loading focus tasks…</div>
</main>

<script>
function escHtml(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
}

function priorityDot(p) {
  const cls = {Urgent:"dot-urgent", High:"dot-high", Normal:"dot-normal", Low:"dot-low"}[p] || "dot-normal";
  return `<div class="priority-dot ${cls}"></div>`;
}

function priorityTag(p) {
  if (p === "Urgent") return `<span class="tag tag-urgent">Urgent</span>`;
  if (p === "High")   return `<span class="tag tag-high">High</span>`;
  return "";
}

function renderTask(t, showDue) {
  const due      = showDue && t.planned_end ? ` · Due ${fmtDate(t.planned_end)}` : "";
  const wt       = t.work_type ? ` · ${t.work_type}` : "";
  const proj     = t.project_name ? `<span>${t.project_name}</span>` : "";
  const ptag     = priorityTag(t.priority);
  const notes    = t.notes ? `<div class="task-notes">${escHtml(t.notes)}</div>` : "";
  const taskJson = JSON.stringify(t).replace(/"/g, '&quot;');
  return `
    <div class="task-card" data-wsid="${t.ws_id}">
      <input type="radio" name="focus-task-radio" class="focus-task-radio"
             value="${t.ws_id}" data-task="${taskJson}"
             onchange="onFocusTaskSelect(this)">
      ${priorityDot(t.priority)}
      <div class="task-body">
        <div class="task-name-row">
          <a class="task-name" href="${t.url.replace('https://', 'notion://')}">${escHtml(t.name)}</a>
          <button class="edit-btn" onclick="editTask('${t.ws_id}')" title="Edit task name or due date">✏️</button>
        </div>
        <div class="task-meta">${proj}${ptag}<span>${t.priority}${due}${wt}</span></div>
        ${notes}
      </div>
    </div>`;
}

function renderBucket(label, emoji, tasks, showDue, weekEnd) {
  const weekNote = label === "Due This Week" && weekEnd
    ? ` <span style="font-weight:400;color:#78716c;font-size:13px;">through ${fmtDate(weekEnd)}</span>`
    : "";
  const emptyMsg = {
    "Overdue":       "✅ Nothing overdue — great!",
    "Due Today":     "📭 Nothing due today.",
    "Due This Week": "📭 Nothing due in the next 7 days.",
  }[label] || "";
  const body = tasks.length === 0
    ? `<div class="empty-msg">${emptyMsg}</div>`
    : tasks.map(t => renderTask(t, showDue)).join("");
  return `
    <div class="bucket">
      <div class="bucket-header">
        <h2>${emoji} ${label}${weekNote}</h2>
        <span class="count-badge">${tasks.length}</span>
      </div>
      ${body}
    </div>`;
}

function setButtons(loading) {
  document.getElementById("btn-refresh").disabled = loading;
  document.getElementById("btn-rebuild").disabled = loading;
  document.getElementById("btn-refresh").innerHTML = loading
    ? '<span class="spinner"></span>Loading…' : "Refresh";
  if (!loading) {
    document.getElementById("btn-rebuild").innerHTML = "🔄 Rebuild cache";
  }
}

function renderFocusTabs(activeTab) {
  const data = window._focusData;
  if (!data) return;
  window._focusActiveTab = activeTab;

  const allCount = (data.all_uncompleted || []).length;
  const tabs = [
    { key: "overdue",   emoji: "🔴", label: "Overdue",   count: data.overdue.length,   redBadge: true  },
    { key: "today",     emoji: "🟡", label: "Today",     count: data.due_today.length,  redBadge: true  },
    { key: "this_week", emoji: "🔵", label: "This Week", count: data.this_week.length,  redBadge: true  },
    { key: "all",       emoji: "⚪", label: "All",       count: allCount,               redBadge: false },
  ];

  const tabBar = tabs.map(t => {
    const hasItems = t.count > 0 && t.redBadge;
    const badgeCls = hasItems ? "tab-badge has-items" : "tab-badge";
    return `<button class="tab-btn${t.key === activeTab ? " active" : ""}"
      onclick="switchFocusTab('${t.key}')">
      ${t.emoji} ${t.label}<span class="${badgeCls}">${t.count}</span>
    </button>`;
  }).join("");

  let contentHtml;
  if (activeTab === "overdue") {
    contentHtml = renderBucket("Overdue",       "🔴", data.overdue,   true,  null);
  } else if (activeTab === "today") {
    contentHtml = renderBucket("Due Today",     "🟡", data.due_today, false, null);
  } else if (activeTab === "this_week") {
    contentHtml = renderBucket("Due This Week", "🔵", data.this_week, true,  data.week_end);
  } else {
    contentHtml = renderAllTabContent(data);
  }

  document.getElementById("main-content").innerHTML =
    `<div class="tab-bar">${tabBar}</div>` + contentHtml;

  // Restore radio selection after re-render
  if (window._focusSelectedTask) {
    const r = document.querySelector(
      `input[name="focus-task-radio"][value="${window._focusSelectedTask.ws_id}"]`
    );
    if (r) r.checked = true;
  }
}

function renderAllTabContent(data) {
  const sort    = window._focusAllSort    || "due";
  const project = window._focusAllProject || "";

  let tasks = (data.all_uncompleted || []).slice();
  if (project) tasks = tasks.filter(t => t.project_name === project);

  if (sort === "due") {
    tasks.sort((a, b) => (a.planned_end || "9999") < (b.planned_end || "9999") ? -1 : 1);
  } else {
    tasks.sort((a, b) => {
      const pc = (a.project_name || "").localeCompare(b.project_name || "");
      return pc !== 0 ? pc : ((a.planned_end || "9999") < (b.planned_end || "9999") ? -1 : 1);
    });
  }

  const projOptions = (data.project_names || []).map(p =>
    `<option value="${escHtml(p)}"${p === project ? " selected" : ""}>${escHtml(p)}</option>`
  ).join("");

  const taskRows = tasks.length === 0
    ? '<div class="empty-msg">No uncompleted tasks match the filter.</div>'
    : tasks.map(t => renderTask(t, true)).join("");

  return `
    <div class="all-controls">
      <select onchange="window._focusAllProject=this.value;renderFocusTabs('all')">
        <option value=""${!project ? " selected" : ""}>All Projects</option>
        ${projOptions}
      </select>
      <div class="sort-toggle">
        <button class="sort-btn${sort === 'due'     ? ' active' : ''}"
          onclick="window._focusAllSort='due';renderFocusTabs('all')">By Due Date</button>
        <button class="sort-btn${sort === 'project' ? ' active' : ''}"
          onclick="window._focusAllSort='project';renderFocusTabs('all')">By Project</button>
      </div>
      <span style="color:#78716c">${tasks.length} task${tasks.length !== 1 ? "s" : ""}</span>
    </div>
    <div class="bucket">${taskRows}</div>`;
}

function switchFocusTab(tab) {
  renderFocusTabs(tab);
}

window._focusSelectedTask = null;
window._focusAllSort      = "due";
window._focusAllProject   = "";

function onFocusTaskSelect(radio) {
  window._focusSelectedTask = JSON.parse(radio.dataset.task);
  document.getElementById("focus-selected-label").textContent =
    window._focusSelectedTask.name;
  const bar = document.getElementById("focus-action-bar");
  bar.style.display = "flex";
  document.body.classList.add("has-action-bar");
}

function loadTaskIntoWS() {
  if (!window._focusSelectedTask) return;
  localStorage.setItem("focal_load_task", JSON.stringify(window._focusSelectedTask));
  window.location.href = "/";
}

async function deleteSelectedTask() {
  const task = window._focusSelectedTask;
  if (!task) return;
  if (!confirm(`Delete "${task.name}" and archive all linked Notion pages? This cannot be undone.`)) return;
  try {
    const res  = await fetch("/api/delete-task", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ws_id: task.ws_id})
    });
    const data = await res.json();
    if (data.error) { alert("Error: " + data.error); return; }
    window._focusSelectedTask = null;
    document.getElementById("focus-action-bar").style.display = "none";
    document.body.classList.remove("has-action-bar");
    await loadFocus();
  } catch(e) {
    alert("Error: " + e.message);
  }
}

function editTask(wsId) {
  const card = document.querySelector(`.task-card[data-wsid="${wsId}"]`);
  if (!card) return;
  const radio = card.querySelector("input[type='radio']");
  const t = JSON.parse(radio.dataset.task);
  const body = card.querySelector(".task-body");
  body.innerHTML = `
    <div class="edit-form">
      <input type="text"  id="edit-name-${wsId}" class="edit-input" value="${escHtml(t.name)}" placeholder="Task name">
      <input type="date"  id="edit-date-${wsId}" class="edit-input" value="${t.planned_end || ""}">
      <div class="edit-actions">
        <button class="btn btn-primary"   style="padding:5px 12px;font-size:12px"
          onclick="saveTaskEdit('${wsId}')">Save</button>
        <button class="btn btn-secondary" style="padding:5px 12px;font-size:12px"
          onclick="renderFocusTabs(window._focusActiveTab)">Cancel</button>
      </div>
    </div>`;
  document.getElementById(`edit-name-${wsId}`).focus();
}

async function saveTaskEdit(wsId) {
  const newName = (document.getElementById(`edit-name-${wsId}`) || {}).value || "";
  const newDue  = (document.getElementById(`edit-date-${wsId}`) || {}).value || "";
  if (!newName.trim()) { alert("Task name cannot be empty."); return; }

  const saveBtn = document.querySelector(`.task-card[data-wsid="${wsId}"] .btn-primary`);
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "Saving…"; }

  try {
    const res  = await fetch("/api/push-to-wbs", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({work_session_id: wsId, new_task_name: newName.trim(), new_due_date: newDue})
    });
    const data = await res.json();
    if (data.error) {
      alert("Error: " + data.error);
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Save"; }
      return;
    }
    await loadFocus();
  } catch(e) {
    alert("Error: " + e.message);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Save"; }
  }
}

async function loadFocus() {
  setButtons(true);
  const main = document.getElementById("main-content");
  main.innerHTML = '<div class="loading"><span class="spinner"></span> Checking task statuses…</div>';
  try {
    const res  = await fetch("/api/focus-tasks", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({})
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }

    const total    = data.overdue.length + data.due_today.length + data.this_week.length;
    const allCount = (data.all_uncompleted || []).length;

    const genAt = data.generated_at
      ? new Date(data.generated_at).toLocaleString("en-US",
          {month:"short", day:"numeric", hour:"numeric", minute:"2-digit"})
      : "—";
    document.getElementById("meta-line").textContent =
      `Cache: ${genAt} · ${data.cache_task_count} tasks total`;

    window._focusData = data;

    if (total === 0 && allCount === 0) {
      main.innerHTML = `<div class="all-clear">🎉<p>No tasks due or overdue. Enjoy the breathing room!</p></div>`;
      return;
    }

    // Default to Today if there are date-bucket tasks; otherwise open All tab
    const defaultTab = total > 0 ? "today" : "all";
    renderFocusTabs(window._focusActiveTab || defaultTab);
  } catch(e) {
    showError(e.message);
  } finally {
    setButtons(false);
  }
}

async function rebuildCache() {
  document.getElementById("btn-rebuild").innerHTML = '<span class="spinner"></span>Rebuilding…';
  setButtons(true);
  try {
    const res  = await fetch("/api/regenerate-focus-cache", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({})
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    await loadFocus();
  } catch(e) {
    showError(e.message);
  } finally {
    setButtons(false);
  }
}

function showError(msg) {
  document.getElementById("main-content").innerHTML =
    `<div class="error-box">⚠️ ${msg}<br><br>
     Make sure the sync tool has a valid Notion token configured.</div>`;
  setButtons(false);
}

loadFocus();
</script>
</body>
</html>
