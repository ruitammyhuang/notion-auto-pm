<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Workload Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f5f4; color: #1c1917; min-height: 100vh; }

  header { background: #fff; border-bottom: 1px solid #e7e5e4; padding: 14px 24px;
           display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; flex: 1; }

  .btn { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer;
         font-size: 13px; font-weight: 500; transition: background .15s; }
  .btn-primary   { background: #2563eb; color: #fff; }
  .btn-primary:hover   { background: #1d4ed8; }
  .btn-secondary { background: #e7e5e4; color: #1c1917; }
  .btn-secondary:hover { background: #d6d3d1; }
  .btn-range { padding: 5px 12px; border-radius: 6px; border: 1px solid #e7e5e4;
               background: #fff; cursor: pointer; font-size: 13px; color: #57534e;
               transition: all .15s; }
  .btn-range.active, .btn-range:hover { background: #2563eb; color: #fff; border-color: #2563eb; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  main { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .toolbar .label { font-size: 13px; color: #78716c; font-weight: 500; }
  .custom-dates { display: none; align-items: center; gap: 6px; }
  .custom-dates input { padding: 5px 8px; border: 1px solid #e7e5e4; border-radius: 6px;
                        font-size: 13px; color: #1c1917; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border: 1px solid #e7e5e4; border-radius: 8px;
               padding: 16px 20px; }
  .stat-card .val { font-size: 28px; font-weight: 700; color: #1c1917; line-height: 1; }
  .stat-card .lbl { font-size: 12px; color: #78716c; margin-top: 4px; }
  .stat-card.warn .val { color: #d97706; }
  .stat-card.warn .lbl { color: #92400e; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .chart-card { background: #fff; border: 1px solid #e7e5e4; border-radius: 8px; padding: 16px 20px; }
  .chart-card h3 { font-size: 13px; font-weight: 600; color: #57534e;
                   text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-label { font-size: 12px; color: #1c1917; width: 140px; white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; background: #f5f5f4; border-radius: 4px; height: 10px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 4px; background: #2563eb; transition: width .4s; }
  .bar-fill-wt { background: #7c3aed; }
  .bar-hrs   { font-size: 12px; color: #78716c; width: 42px; text-align: right; flex-shrink: 0; }
  .empty-chart { font-size: 13px; color: #a8a29e; padding: 8px 0; }

  .section-card { background: #fff; border: 1px solid #e7e5e4; border-radius: 8px;
                  padding: 16px 20px; margin-bottom: 16px; }
  .section-card h3 { font-size: 13px; font-weight: 600; color: #57534e;
                     text-transform: uppercase; letter-spacing: .04em; margin-bottom: 14px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 0 10px 8px 0; color: #78716c; font-weight: 500;
       font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
       border-bottom: 1px solid #e7e5e4; }
  td { padding: 9px 10px 9px 0; border-bottom: 1px solid #f5f5f4; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .dur { font-weight: 600; color: #1c1917; }
  .status-badge { display: inline-block; padding: 2px 6px; border-radius: 4px;
                  font-size: 11px; font-weight: 500; }
  .status-completed { background: #dcfce7; color: #166534; }
  .status-inprog    { background: #fef9c3; color: #854d0e; }
  .status-other     { background: #f5f5f4; color: #57534e; }
  .sess-name a { color: #1c1917; text-decoration: none; font-weight: 500; }
  .sess-name a:hover { text-decoration: underline; }
  .sess-proj { font-size: 11px; color: #78716c; margin-top: 2px; }

  /* Work type inline editor */
  .wt-cell { display: flex; align-items: center; gap: 6px; min-width: 160px; }
  .wt-label { font-size: 12px; color: #57534e; }
  .wt-edit-btn { background: none; border: none; cursor: pointer; color: #a8a29e;
                 font-size: 11px; padding: 1px 4px; border-radius: 3px; line-height: 1;
                 transition: color .15s; }
  .wt-edit-btn:hover { color: #2563eb; }
  .wt-select { font-size: 12px; padding: 3px 6px; border: 1px solid #d6d3d1;
               border-radius: 5px; background: #fff; color: #1c1917; cursor: pointer;
               max-width: 180px; }
  .wt-select:focus { outline: none; border-color: #2563eb; }
  .wt-saving { font-size: 11px; color: #78716c; font-style: italic; }
  .wt-saved  { font-size: 11px; color: #166534; }
  .wt-error  { font-size: 11px; color: #dc2626; }

  .p-urgent { background: #fee2e2; color: #dc2626; }
  .p-high   { background: #ffedd5; color: #c2410c; }
  .p-normal { background: #f5f5f4; color: #57534e; }
  .p-low    { background: #f5f5f4; color: #a8a29e; }

  .loading-inline { font-size: 13px; color: #78716c; padding: 12px 0; }
  .error-box { color: #dc2626; font-size: 13px; padding: 12px 0; }
  .all-clear  { text-align: center; padding: 40px 0; font-size: 24px; }
  .all-clear p { font-size: 14px; color: #78716c; margin-top: 6px; }

  .spinner { display: inline-block; width: 14px; height: 14px;
             border: 2px solid #e7e5e4; border-top-color: #2563eb;
             border-radius: 50%; animation: spin .7s linear infinite;
             vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 680px) {
    .charts-row { grid-template-columns: 1fr; }
    .stats-row  { grid-template-columns: repeat(2, 1fr); }
    .bar-label  { width: 100px; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 Workload Dashboard</h1>
  <a href="/focus"    class="btn btn-secondary" style="text-decoration:none;">📌 Focus</a>
  <a href="/"         class="btn btn-secondary" style="text-decoration:none;">← Focal</a>
</header>

<main>
  <!-- Toolbar -->
  <div class="toolbar">
    <span class="label">Range:</span>
    <button class="btn-range active" id="btn-today"      onclick="setMode('today')">Today</button>
    <button class="btn-range"        id="btn-this_week"  onclick="setMode('this_week')">This Week</button>
    <button class="btn-range"        id="btn-last_week"  onclick="setMode('last_week')">Last Week</button>
    <button class="btn-range"        id="btn-this_month" onclick="setMode('this_month')">This Month</button>
    <button class="btn-range"                            onclick="setMode('custom')">Custom…</button>
    <div class="custom-dates" id="custom-dates">
      <input type="date" id="start-date">
      <span style="color:#78716c">to</span>
      <input type="date" id="end-date">
      <button class="btn btn-primary" onclick="load()">Go</button>
    </div>
  </div>

  <!-- Stats — 4 cards, 4th shows unclassified count -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="val" id="stat-hours">—</div>
      <div class="lbl">Total Hours</div>
    </div>
    <div class="stat-card">
      <div class="val" id="stat-sessions">—</div>
      <div class="lbl">Sessions</div>
    </div>
    <div class="stat-card">
      <div class="val" id="stat-projects">—</div>
      <div class="lbl">Projects</div>
    </div>
    <div class="stat-card" id="stat-unclassified-card">
      <div class="val" id="stat-unclassified">—</div>
      <div class="lbl" id="stat-unclassified-lbl">Unclassified</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <h3>By Project</h3>
      <div id="chart-project"><div class="loading-inline"><span class="spinner"></span> Loading…</div></div>
    </div>
    <div class="chart-card">
      <h3>By Work Type</h3>
      <div id="chart-worktype"><div class="loading-inline"><span class="spinner"></span> Loading…</div></div>
    </div>
  </div>

  <!-- Sessions table -->
  <div class="section-card">
    <h3>Sessions</h3>
    <div id="sessions-body"><div class="loading-inline"><span class="spinner"></span> Loading…</div></div>
  </div>

</main>

<script>
let currentMode   = "today";
let _workTypes    = [];   // populated from /api/work-types on first load
let _lastData     = null; // cached last API response for chart refresh

// ── Work types ─────────────────────────────────────────────────────────────────
async function fetchWorkTypes() {
  if (_workTypes.length) return;
  try {
    const r = await fetch("/api/work-types");
    const d = await r.json();
    _workTypes = d.work_types || [];
  } catch (e) {
    _workTypes = ["🔵 Deep Work","🟡 Meeting & Call","🟠 Admin & Ops","🟢 Communication"];
  }
}

// ── Toolbar ────────────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".btn-range").forEach(b => b.classList.remove("active"));
  const el = document.getElementById("btn-" + mode);
  if (el) el.classList.add("active");
  document.getElementById("custom-dates").style.display = mode === "custom" ? "flex" : "none";
  if (mode !== "custom") load();
}

function buildPayload() {
  const p = {mode: currentMode};
  if (currentMode === "custom") {
    p.start_date = document.getElementById("start-date").value;
    p.end_date   = document.getElementById("end-date").value;
    if (!p.start_date || !p.end_date) return null;
  }
  return p;
}

// ── Formatters ─────────────────────────────────────────────────────────────────
function fmtHours(h) {
  if (h == null) return "—";
  const hrs = Math.floor(h), mins = Math.round((h - hrs) * 60);
  return hrs > 0 ? (mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`) : `${mins}m`;
}

function fmtDT(iso) {
  if (!iso) return "—";
  try {
    return new Date(iso).toLocaleString("en-US",
      {month:"short", day:"numeric", hour:"numeric", minute:"2-digit", hour12:true});
  } catch { return iso; }
}

function statusClass(s) {
  if (s === "Completed")   return "status-completed";
  if (s === "In Progress") return "status-inprog";
  return "status-other";
}

// ── Charts ─────────────────────────────────────────────────────────────────────
function renderBars(items, maxHours, fillClass) {
  if (!items || items.length === 0)
    return '<div class="empty-chart">No data for this period.</div>';
  return items.map(item => `
    <div class="bar-row">
      <div class="bar-label" title="${item.name}">${item.name}</div>
      <div class="bar-track">
        <div class="bar-fill ${fillClass}"
             style="width:${maxHours ? (item.hours/maxHours*100).toFixed(1) : 0}%"></div>
      </div>
      <div class="bar-hrs">${fmtHours(item.hours)}</div>
    </div>`).join("");
}

// ── Work Type cell ─────────────────────────────────────────────────────────────

function renderWtCell(s) {
  const wsId      = s.ws_id || "";
  const wt        = s.work_type;
  const locked    = s.locked_work_type;
  const auditId   = s.latest_audit_id || "";
  const wbsId     = s.wbs_page_id || "";

  if (!wsId) {
    return `<span class="wt-label">${wt || "—"}</span>`;
  }

  if (!wt || wt === "Unclassified") {
    return wtDropdown(wsId, "");
  }

  const lockIcon = locked
    ? `<button class="wt-edit-btn" title="Recoded by health check — click to rollback"
               style="color:#d97706;" onclick="wtRollback('${wbsId}','${auditId}','${wsId}')">↩</button>`
    : "";

  return `
    <div class="wt-cell" id="wt-cell-${wsId}">
      <span class="wt-label">${wt}</span>
      <button class="wt-edit-btn" title="Change work type"
              onclick="wtStartEdit('${wsId}','${wt.replace(/'/g,"\\'")}')">✎</button>
      ${lockIcon}
    </div>`;
}

function wtDropdown(wsId, current) {
  const opts = _workTypes.map(wt =>
    `<option value="${wt}" ${wt === current ? "selected" : ""}>${wt}</option>`
  ).join("");
  return `
    <div class="wt-cell" id="wt-cell-${wsId}">
      <select class="wt-select" onchange="wtSave('${wsId}', this.value, this)">
        <option value="">— set work type —</option>
        ${opts}
      </select>
    </div>`;
}

function wtStartEdit(wsId, current) {
  const cell = document.getElementById(`wt-cell-${wsId}`);
  if (!cell) return;
  cell.innerHTML = `
    <select class="wt-select" onchange="wtSave('${wsId}', this.value, this)">
      ${_workTypes.map(wt =>
        `<option value="${wt}" ${wt === current ? "selected" : ""}>${wt}</option>`
      ).join("")}
    </select>
    <button class="wt-edit-btn" title="Cancel"
            onclick="wtCancelEdit('${wsId}','${current.replace(/'/g,"\\'")}')">✕</button>`;
}

function wtCancelEdit(wsId, original) {
  const cell = document.getElementById(`wt-cell-${wsId}`);
  if (!cell) return;
  cell.outerHTML = `
    <div class="wt-cell" id="wt-cell-${wsId}">
      <span class="wt-label">${original}</span>
      <button class="wt-edit-btn" title="Change work type"
              onclick="wtStartEdit('${wsId}','${original.replace(/'/g,"\\'")}')">✎</button>
    </div>`;
}

async function wtSave(wsId, workType, selectEl) {
  if (!workType) return;
  const cell = document.getElementById(`wt-cell-${wsId}`);
  if (cell) cell.innerHTML = `<span class="wt-saving">⏳ Saving…</span>`;

  try {
    const r = await fetch("/api/set-work-type", {
      method:  "POST",
      headers: {"Content-Type": "application/json"},
      body:    JSON.stringify({ ws_id: wsId, work_type: workType }),
    });
    const d = await r.json();

    if (!r.ok || d.error) {
      if (cell) cell.innerHTML =
        `<span class="wt-error" title="${d.error || ""}">❌ Failed</span>`;
      return;
    }

    // Success — show label + edit button
    if (cell) {
      cell.outerHTML = `
        <div class="wt-cell" id="wt-cell-${wsId}">
          <span class="wt-label">${workType}</span>
          <button class="wt-edit-btn" title="Change work type"
                  onclick="wtStartEdit('${wsId}','${workType.replace(/'/g,"\\'")}')">✎</button>
          <span class="wt-saved" id="wt-saved-${wsId}">✓</span>
        </div>`;
      setTimeout(() => {
        const ok = document.getElementById(`wt-saved-${wsId}`);
        if (ok) ok.style.display = "none";
      }, 2000);
    }

    if (d.warning) console.warn("set-work-type warning:", d.warning);

    // Update the unclassified count stat
    refreshUnclassifiedCount();

  } catch (e) {
    if (cell) cell.innerHTML = `<span class="wt-error">❌ Error</span>`;
  }
}

function refreshUnclassifiedCount() {
  const card = document.getElementById("stat-unclassified-card");
  const val  = document.getElementById("stat-unclassified");
  if (!val) return;
  const n    = parseInt(val.textContent) || 0;
  const newN = Math.max(0, n - 1);
  val.textContent = newN;
  if (card) card.className = newN > 0 ? "stat-card warn" : "stat-card";
}

async function wtRollback(wbsId, auditId, wsId) {
  if (!auditId) {
    alert("No audit record found for this recode. Open the Health Check page to manage history.");
    return;
  }
  // Fetch history to show what will be reverted
  let prevType = "";
  try {
    const h = await fetch(`/api/recode/history/${wbsId}`).then(r => r.json());
    const last = (h.history || []).filter(e => e.action !== "rollback").slice(-1)[0];
    if (last) prevType = last.from_work_type || "";
  } catch (_) {}

  const msg = prevType
    ? `Roll back to "${prevType}"? This will undo the health check recode.`
    : "Roll back this recode? This will revert the work type to its previous value.";
  if (!confirm(msg)) return;

  const cell = document.getElementById(`wt-cell-${wsId}`);
  if (cell) cell.innerHTML = `<span class="wt-saving">&#8635; Rolling back...</span>`;

  try {
    const r = await fetch(`/api/recode/rollback/${auditId}`, {
      method: "POST", headers: {"Content-Type":"application/json"}
    });
    const d = await r.json();
    if (!r.ok || d.error) {
      if (cell) cell.innerHTML = `<span class="wt-error">Rollback failed: ${d.error || ""}</span>`;
      return;
    }
    // Reload page section to reflect new work type
    load();
  } catch (e) {
    if (cell) cell.innerHTML = `<span class="wt-error">Error: ${e.message}</span>`;
  }
}

// ── Sessions table ─────────────────────────────────────────────────────────────
function renderSessions(sessions) {
  if (!sessions || sessions.length === 0)
    return '<div class="all-clear">📭<p>No sessions logged for this period.</p></div>';

  const rows = sessions.map(s => `
    <tr>
      <td class="sess-name">
        <a href="${s.url.replace("https://","notion://")}">${s.name}</a>
        <div class="sess-proj">${s.project}</div>
      </td>
      <td>${fmtDT(s.start)}</td>
      <td>${s.end ? fmtDT(s.end) : '<span style="color:#a8a29e">in progress</span>'}</td>
      <td class="dur">${fmtHours(s.duration)}</td>
      <td>${renderWtCell(s)}</td>
      <td><span class="status-badge ${statusClass(s.status)}">${s.status}</span></td>
    </tr>`).join("");

  return `<table>
    <thead><tr>
      <th>Session</th><th>Start</th><th>End</th>
      <th>Duration</th><th>Work Type</th><th>Status</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Main load ──────────────────────────────────────────────────────────────────
async function load() {
  const payload = buildPayload();
  if (!payload) return;

  await fetchWorkTypes();

  document.getElementById("chart-project").innerHTML   = '<div class="loading-inline"><span class="spinner"></span> Loading…</div>';
  document.getElementById("chart-worktype").innerHTML  = '<div class="loading-inline"><span class="spinner"></span> Loading…</div>';
  document.getElementById("sessions-body").innerHTML   = '<div class="loading-inline"><span class="spinner"></span> Loading…</div>';
  document.getElementById("stat-hours").textContent    = "—";
  document.getElementById("stat-sessions").textContent = "—";
  document.getElementById("stat-projects").textContent = "—";
  document.getElementById("stat-unclassified").textContent = "—";

  try {
    const res  = await fetch("/api/workload", {
      method:  "POST",
      headers: {"Content-Type":"application/json"},
      body:    JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) { showErr(data.error); return; }
    _lastData = data;

    // Stats
    document.getElementById("stat-hours").textContent    = fmtHours(data.total_hours);
    document.getElementById("stat-sessions").textContent = data.session_count;
    document.getElementById("stat-projects").textContent = data.project_count;

    const unc  = data.unclassified_count ?? 0;
    const ucEl = document.getElementById("stat-unclassified");
    const ucCard = document.getElementById("stat-unclassified-card");
    ucEl.textContent = unc;
    ucCard.className = unc > 0 ? "stat-card warn" : "stat-card";
    document.getElementById("stat-unclassified-lbl").textContent =
      unc > 0 ? "Unclassified ↓" : "Unclassified";

    // Charts
    const maxP  = data.by_project[0]?.hours  || 1;
    const maxWT = data.by_work_type[0]?.hours || 1;
    document.getElementById("chart-project").innerHTML  = renderBars(data.by_project,   maxP,  "");
    document.getElementById("chart-worktype").innerHTML = renderBars(data.by_work_type, maxWT, "bar-fill-wt");

    // Sessions
    document.getElementById("sessions-body").innerHTML = renderSessions(data.sessions);

  } catch(e) {
    showErr(e.message);
  }
}

function showErr(msg) {
  const html = `<div class="error-box">⚠️ ${msg}</div>`;
  document.getElementById("chart-project").innerHTML  = html;
  document.getElementById("chart-worktype").innerHTML = html;
  document.getElementById("sessions-body").innerHTML  = html;
}

document.addEventListener("DOMContentLoaded", load);
</script>
</body>
</html>
